name: Update package version
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: "Specify version"
        required: false
        type: string
        default: ""
      bump:
        description: "Perform bump"
        required: false
        type: string
        default: ""

permissions:
  contents: write
  pull-requests: write

env:
  FORCE_COLOR: "3"

jobs:
  rooster:
    name: Rooster update
    runs-on: ubuntu-slim
    # only allow on main branch
    if: github.ref == 'refs/heads/main'
    environment:
      name: pull-request
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: ./.github/actions/setup-cached-uv-and-python
        with:
          python-version-file: ".python-version"
          cache-dependency-path: requirements/lock/uvx-tools.txt

      - name: Bump version with rooster
        id: bump
        env:
          version: ${{ "{{ inputs.version || '' }}" }}
          bump: ${{ "{{ inputs.bump || '' }}" }}
          event_name: ${{ "{{ github.event_name }}" }}
        run: |
          # rooster bump version
          if [ "$version" != "" ]; then
            options"--version=${version}"
          elif [ "$bump" != "" ]; then
            options="--bump=${bump}"
          else
            options=""
          fi

          if ! uvx -crequirements/lock/uvx-tools.txt rooster release "$options"; then
            # also run uv
            uv lock
            changed='true'
          else
            changed='false'
          fi

          echo "changed=$changed" >> "$GITHUB_OUTPUT"
        shell: bash

      - id: message
        if: steps.bump.outputs.changed == 'true'
        run: |
          import os
          import tomllib
          from pathlib import Path

          project = tomllib.loads(Path("pyproject.toml").read_text())["project"]

          package_version = project["version"]
          package_name = project["name"]

          message = f"chore(bump): bump {package_name} to version {package_version}"
          branch = f"release/v{package_version}"

          with open(os.getenv("GITHUB_OUTPUT"), "a") as f:
            f.write(f"{message=:s}\n")
            f.write(f"{branch=:s}\n")
        shell: python

      - name: Create pull request
        if: steps.bump.outputs.changed == 'true'
        id: cpr
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8.1.0
        with:
          token: ${{ "{{ secrets.PAT }}" }}
          add-paths: .
          commit-message: ${{ "{{ steps.message.outputs.message }}" }}
          title: ${{ "{{ steps.message.outputs.message }}" }}
          labels: |
            internal
          draft: true # create as draft pull request to avoid too many checks
          branch: ${{ "{{ steps.message.outputs.branch }}" }}
          delete-branch: true
          # branch-suffix: timestamp  # If want commit per run (instead of per workflow)
          body: |
            This is an autogenerated PR. Use this to bump the package version.

      - name: Pull request info
        if: ${{ "{{ steps.cpr.outputs.pull-request-number }}" }}
        env:
          NUMBER: ${{ "{{ steps.cpr.outputs.pull-request-number }}" }}
          URL: ${{ "{{ steps.cpr.outputs.pull-request-url }}" }}
          OPERATION: ${{ "{{ steps.cpr.outputs.pull-request-operation }}" }}
          SHA: ${{ "{{ steps.cpr.outputs.pull-request-sha }}" }}
          BRANCH: ${{ "{{ steps.cpr.outputs.pull-request-branch }}" }}
          VERIFIED: ${{ "{{ steps.cpr.outputs.pull-request-commits-verified }}" }}
        run: |
          echo "Pull Request Number    - $NUMBER"
          echo "Pull Request URL       - $URL"
          echo "Pull Request Operation - $OPERATION"
          echo "Pull Request SHA       - $SHA"
          echo "Pull Request BRANCH    - $BRANCH"
          echo "Pull Request VERIFIED  - $VERIFIED"
